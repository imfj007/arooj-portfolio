<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1200px; height:630px; overflow:hidden; background:#0d0d0f; font-family:'Inter',sans-serif; }
  .wrap { width:1200px; height:630px; background:#0d0d0f; position:relative; display:flex; align-items:center; padding:0 100px; }
  .glow { position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(109,40,217,0.28) 0%, transparent 65%); top:-180px; left:-80px; }
  .top-line { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, #7c3aed 0%, #a78bfa 50%, transparent 100%); }
  .inner { position:relative; z-index:2; }
  .label { font-size:12px; font-weight:400; letter-spacing:4px; text-transform:uppercase; color:#7c3aed; margin-bottom:20px; }
  .name { font-size:86px; font-weight:700; color:#ffffff; line-height:1; letter-spacing:-2px; margin-bottom:20px; }
  .line { width:48px; height:2px; background:#7c3aed; margin-bottom:20px; border-radius:2px; }
  .role { font-size:20px; font-weight:300; color:rgba(255,255,255,0.5); margin-bottom:38px; }
  .role b { color:rgba(255,255,255,0.85); font-weight:500; }
  .footer { font-size:13px; font-weight:300; color:rgba(255,255,255,0.22); letter-spacing:1px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>
  <div class="top-line"></div>
  <div class="inner">
    <div class="label">Portfolio</div>
    <div class="name">Arooj Jamil</div>
    <div class="line"></div>
    <div class="role"><b>SEO Executive</b> · Digital Marketing Specialist · Creative Strategist</div>
    <div class="footer">📍 Lahore, Pakistan</div>
  </div>
</div>
</body>
</html>
